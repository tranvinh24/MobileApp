# Server
server.port=8082

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/eldercare?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=120504
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=eldercare-secret-key-very-long-for-security-minimum-256-bits-required-for-HS256
jwt.expiration=86400000

# CORS - cho phép React Native
app.cors.allowed-origins=*

# Upload (chat gửi ảnh)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB
